name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.1.0). If empty, uses pushed tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Read release notes
        id: read_notes
        run: |
          set -euo pipefail

          # Input tag when run manually
          TAG_INPUT="${{ github.event.inputs.tag }}"

          # If input provided, use it; otherwise extract from GITHUB_REF
          if [ -n "$TAG_INPUT" ]; then
            version="$TAG_INPUT"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi

          release_file="release-notes/${version}.md"
          body="Release ${version}"

          # Ensure we have refs to origin
          git fetch --no-tags origin +refs/heads/*:refs/remotes/origin/* || true

          # If tag doesn't exist remotely and user provided tag, create it from origin/main
          if [ -n "$version" ]; then
            if ! git ls-remote --tags origin | grep -q "refs/tags/${version}"; then
              if [ -n "$TAG_INPUT" ]; then
                echo "Tag ${version} not found on remote; creating tag from origin/main"
                git fetch origin main --depth=1 || true
                git tag -a "$version" origin/main -m "Release ${version}"
                git push origin "$version"
              fi
            fi
          fi

          if [ -f "$release_file" ]; then
            body=$(cat "$release_file")
          else
            if git show origin/main:"$release_file" >/dev/null 2>&1; then
              body=$(git show origin/main:"$release_file")
            fi
          fi

          printf '%s\n' "$body" > /tmp/release_body.txt
          {
            echo "body<<ENDOFBODY"
            cat /tmp/release_body.txt
            echo "ENDOFBODY"
            echo "tag=${version}"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.read_notes.outputs.tag }}
          body: ${{ steps.read_notes.outputs.body }}
          make_latest: true
